<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KauScope | 買う前価格チェック</title>
  <meta name="description" content="商品名・型番・JANコードから楽天市場の価格相場をチェックできるツールです。" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero">
    <nav class="nav">
      <div class="brand">KauScope</div>
      <div class="badge">PR / Rakuten price checker</div>
    </nav>

    <section class="hero-content">
      <p class="eyebrow">買う前に、相場を見る。</p>
      <h1>商品名・型番・JANコードで<br />楽天価格をチェック。</h1>
      <p class="lead">
        最安値・最高値・平均価格をまとめて確認。検索モードと価格フィルターで、余計な商品を減らせます。
      </p>

      <form id="searchForm" class="search-card">
        <label class="label" for="keyword">商品名・型番・JANコード</label>
        <div class="search-row">
          <input id="keyword" name="keyword" type="search" placeholder="例：モバイルバッテリー / Anker A1257 / 490..." autocomplete="off" required />
          <button type="submit">価格を調べる</button>
        </div>

        <div class="mode-box">
          <p class="label">検索モード</p>
          <label><input type="radio" name="mode" value="loose" checked /> ゆるく探す</label>
          <label><input type="radio" name="mode" value="title" /> 商品名に含むものだけ</label>
          <label><input type="radio" name="mode" value="code" /> 型番・JANコードで探す</label>
        </div>

        <details class="filters" open>
          <summary>フィルターを調整</summary>

          <div class="filter-grid">
            <label>
              最低価格
              <input id="minPrice" type="number" inputmode="numeric" min="0" placeholder="例：500" />
            </label>
            <label>
              最高価格
              <input id="maxPrice" type="number" inputmode="numeric" min="0" placeholder="空欄で指定なし" />
            </label>
            <label>
              並び替え
              <select id="sort">
                <option value="standard">標準</option>
                <option value="price-asc">安い順</option>
                <option value="price-desc">高い順</option>
                <option value="review-desc">レビュー件数順</option>
              </select>
            </label>
          </div>

          <label class="wide">
            除外ワード
            <input id="exclude" type="text" placeholder="例：ケーブル,コード,ケース,フィルム,ポーチ" />
          </label>

          <div class="preset-row">
            <button type="button" data-preset="mobile">モバイルバッテリー向け</button>
            <button type="button" data-preset="power">ポータブル電源向け</button>
            <button type="button" data-preset="disaster">防災セット向け</button>
            <button type="button" data-preset="clear">フィルターなし</button>
          </div>
        </details>

        <p class="notice">※当ページはPRを含みます。価格・在庫・ポイント還元は取得時点の情報です。最新情報は各販売ページでご確認ください。</p>
      </form>
    </section>
  </header>

  <main>
    <section id="summary" class="summary hidden"></section>
    <section id="status" class="status"></section>
    <section id="results" class="results"></section>
  </main>

  <footer class="footer">
    <p>KauScope は楽天市場の商品情報をもとにした価格チェックツールです。</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
